name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - run: cargo test -p microfips-core

  build-host:
    name: Build Host Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - run: cargo build -p microfips-link --release

      - uses: actions/upload-artifact@v4
        with:
          name: fips-handshake
          path: target/release/fips-handshake
          retention-days: 7

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src, clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -p microfips-core -p microfips-link -- --check

      - name: Run clippy
        run: cargo clippy -p microfips-core -p microfips-link -- -D warnings

  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    env:
      EMBASSY_REPO: Amperstrand/embassy
      EMBASSY_REV: c0289d7a8935c8194808b689653bd5fd72620536
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          targets: thumbv7em-none-eabi
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: firmware

      - name: Clone embassy fork
        run: |
          git clone --filter=blob:none \
            https://github.com/${EMBASSY_REPO}.git \
            $HOME/embassy
          cd $HOME/embassy
          git checkout ${EMBASSY_REV}

      - name: Patch Cargo.toml for CI paths
        run: |
          sed -i 's|path = "../../../embassy/|path = "'$HOME'/embassy/|g' crates/microfips-fw/Cargo.toml

      - run: cargo build -p microfips-fw --release --target thumbv7em-none-eabi

      - name: Check binary size
        run: |
          BINARY="target/thumbv7em-none-eabi/release/microfips"
          SIZE=$(stat -c%s "$BINARY")
          echo "Firmware size: $SIZE bytes ($(($SIZE / 1024)) KB)"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
        id: size

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: target/thumbv7em-none-eabi/release/microfips
          retention-days: 7

  fips-integration:
    name: FIPS Integration Test
    runs-on: ubuntu-latest
    needs: [build-host, test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: fips-handshake
          path: ./bin

      - run: chmod +x ./bin/fips-handshake

      - name: Run FIPS handshake against public node
        timeout-minutes: 1
        run: |
          echo "Testing Noise IK handshake against fips-test-node (217.77.8.91:2121)"
          echo "Note: FIPS only responds to configured peers, so timeout is expected from CI."
          ./bin/fips-handshake 217.77.8.91:2121 || {
            EXIT=$?
            if [ $EXIT -eq 1 ]; then
              echo "::warning::FIPS integration test timed out (expected — CI IP not configured as peer)"
              exit 0
            fi
            exit $EXIT
          }
          echo "::notice::FIPS handshake succeeded!"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, build-host, lint, build-firmware, fips-integration]
    if: always()
    steps:
      - run: |
          echo "# CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | \`${{ needs.test.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Host Tools | \`${{ needs.build-host.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Format | \`${{ needs.lint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Firmware | \`${{ needs.build-firmware.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FIPS Integration | \`${{ needs.fips-integration.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
