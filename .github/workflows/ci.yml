name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - run: cargo test -p microfips-core

      # Run with --features std to include load_secret/load_peer_pub tests;
      # --test-threads=1 because env var tests modify process-global state.
      - run: cargo test -p microfips-core --features std -- --test-threads=1

      - run: cargo test -p microfips-protocol --features std -- --test-threads=1

  noise-compliance:
    name: Noise Spec Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - name: Count tests
        run: |
          CORE_COUNT=$(cargo test -p microfips-core --features std -- --list 2>&1 | grep -c "test$" || true)
          PROTO_COUNT=$(cargo test -p microfips-protocol --features std -- --list 2>&1 | grep -c "test$" || true)
          FSP_COUNT=$(cargo test -p microfips-core --features std --test fsp_over_fmp -- --list 2>&1 | grep -c "test$" || true)
          TOTAL=$((CORE_COUNT + FSP_COUNT))
          echo "Core tests: $CORE_COUNT (expect >= 95)"
          echo "Protocol tests: $PROTO_COUNT (expect >= 26)"
          echo "FSP integration tests: $FSP_COUNT (expect >= 3)"
          echo "Total core: $TOTAL (expect >= 98)"
          if [ "$CORE_COUNT" -lt 95 ]; then
            echo "::error::Core test count dropped below 95 (got $CORE_COUNT)"
            exit 1
          fi
          if [ "$PROTO_COUNT" -lt 26 ]; then
            echo "::error::Protocol test count dropped below 26 (got $PROTO_COUNT)"
            exit 1
          fi
          if [ "$FSP_COUNT" -lt 3 ]; then
            echo "::error::FSP integration test count dropped below 3 (got $FSP_COUNT)"
            exit 1
          fi

      - name: Verify FIPS-bug-compatible deviations are documented
        run: |
          NOISE_RS="crates/microfips-core/src/noise.rs"
          echo "Checking that Noise deviations are documented..."
          grep -q "FIPS: no AAD during handshake" "$NOISE_RS" || { echo "::error::Missing D1 documentation (empty AAD)"; exit 1; }
          grep -q "se_and_es_produce_different_keys" "$NOISE_RS" || { echo "::error::Missing D2 documentation (se DH swap)"; exit 1; }
          echo "D1 (empty AAD) and D2 (se DH swap) deviations are documented."

      - name: Run deviation-specific tests
        run: |
          cargo test -p microfips-core --features std -- se_and_es_produce_different_keys
          cargo test -p microfips-core --features std -- ik_se_uses_es_dh_inputs_intentionally
          cargo test -p microfips-core --features std -- fsp_session_full_flow
          cargo test -p microfips-core --features std --test fsp_over_fmp -- test_fsp_full_handshake_over_fmp

      - name: Run Noise IK transport key consistency (10 rounds)
        run: |
          for i in $(seq 1 10); do
            cargo test -p microfips-core --features std -- noise_ik_transport_keys_are_deterministic --quiet || { echo "::error::IK transport key test failed on round $i"; exit 1; }
          done
          echo "IK transport keys consistent across 10 rounds"

      - name: Run Noise XK transport key consistency (10 rounds)
        run: |
          for i in $(seq 1 10); do
            cargo test -p microfips-core --features std -- noise_xk_transport_keys_are_deterministic --quiet || { echo "::error::XK transport key test failed on round $i"; exit 1; }
          done
          echo "XK transport keys consistent across 10 rounds"

      - name: Check FSP handshake stability (10 rounds)
        run: |
          for i in $(seq 1 10); do
            cargo test -p microfips-core --features std --test fsp_over_fmp -- test_fsp_full_handshake_over_fmp --quiet || { echo "::error::FSP handshake test failed on round $i"; exit 1; }
          done
          echo "FSP full handshake stable across 10 rounds"

  build-host:
    name: Build Host Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@v2

      - run: cargo build -p microfips-link --release
      - run: cargo build -p microfips-sim --release
      - run: cargo build -p microfips-http-test --release

      - uses: actions/upload-artifact@v4
        with:
          name: fips-handshake
          path: target/release/fips-handshake
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: microfips-sim
          path: target/release/microfips-sim
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: microfips-http-test
          path: target/release/microfips-http-test
          retention-days: 7

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -p microfips-core -p microfips-protocol -p microfips-link -p microfips-sim -p microfips-http-test -- --check

      - name: Run clippy
        run: cargo clippy -p microfips-core -p microfips-protocol -p microfips-link -p microfips-sim -p microfips-http-test -- -D warnings

  sim-smoke:
    name: Simulator Smoke Test
    runs-on: ubuntu-latest
    needs: [build-host]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: microfips-sim
          path: ./bin

      - run: chmod +x ./bin/microfips-sim

      - name: Verify simulator starts and exits cleanly on EOF
        timeout-minutes: 1
        run: |
          timeout 5 ./bin/microfips-sim </dev/null 2>&1 | head -5
          echo "sim exited with code $?"

  fips-integration:
    name: FIPS Handshake Integration
    runs-on: ubuntu-latest
    needs: [build-host]
    env:
      FIPS_ADDR: orangeclaw.dns4sats.xyz:2121
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: fips-handshake
          path: ./bin

      - uses: actions/download-artifact@v4
        with:
          name: microfips-http-test
          path: ./bin

      - run: chmod +x ./bin/fips-handshake ./bin/microfips-http-test

      - name: Generate fresh key pairs
        run: |
          echo "--- Generating node (responder) key pair ---"
          NODE_KEYS=$(./bin/fips-handshake --keygen)
          echo "$NODE_KEYS"
          echo "NODE_SECRET=$(echo "$NODE_KEYS" | sed -n 's/^FIPS_SECRET=//p')" >> "$GITHUB_ENV"
          echo "NODE_PUB=$(echo "$NODE_KEYS" | sed -n 's/^FIPS_PUB=//p')" >> "$GITHUB_ENV"

          echo "--- Generating leaf (initiator) key pair ---"
          LEAF_KEYS=$(./bin/fips-handshake --keygen)
          echo "$LEAF_KEYS"
          echo "LEAF_SECRET=$(echo "$LEAF_KEYS" | sed -n 's/^FIPS_SECRET=//p')" >> "$GITHUB_ENV"
          echo "LEAF_PUB=$(echo "$LEAF_KEYS" | sed -n 's/^FIPS_PUB=//p')" >> "$GITHUB_ENV"

      - name: Start FIPS responder
        run: |
          echo "Starting responder with node key..."
          FIPS_SECRET="$NODE_SECRET" ./bin/microfips-http-test 127.0.0.1:31338 &
          echo $! > /tmp/responder.pid
          sleep 1
          echo "Responder running (pid $(cat /tmp/responder.pid))"

      - name: "Test 1: Leaf → local node handshake (fresh keys)"
        timeout-minutes: 1
        run: |
          echo "=== Leaf → Node handshake (fresh keys, localhost) ==="
          FIPS_SECRET="$LEAF_SECRET" FIPS_PEER_PUB="$NODE_PUB" \
            ./bin/fips-handshake 127.0.0.1:31338
          echo "=== LOCAL HANDSHAKE SUCCEEDED ==="

      - name: Stop local responder
        if: always()
        run: |
          if [ -f /tmp/responder.pid ]; then
            kill "$(cat /tmp/responder.pid)" 2>/dev/null || true
          fi

      - name: "Test 2: Leaf → public FIPS node (default keys)"
        timeout-minutes: 1
        continue-on-error: true
        run: |
          echo "=== Leaf → public FIPS node ==="
          echo "Using default MCU identity and VPS peer pubkey"
          ./bin/fips-handshake "$FIPS_ADDR" 2>&1 || true
          echo "=== (continue-on-error: VPS may be unreachable from CI) ==="

  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          targets: thumbv7em-none-eabi
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install ARM tools
        run: sudo apt-get update -qq && sudo apt-get install -yqq gcc-arm-none-eabi

      - run: cargo build -p microfips --release --target thumbv7em-none-eabi

      - name: Validate firmware binary
        run: |
          BINARY="target/thumbv7em-none-eabi/release/microfips"
          ELF_SIZE=$(stat -c%s "$BINARY")
          TEXT_SIZE=$(arm-none-eabi-size "$BINARY" | tail -1 | awk '{print $1}')
          echo "ELF size: $ELF_SIZE bytes ($(($ELF_SIZE / 1024)) KB)"
          echo ".text size: $TEXT_SIZE bytes"
          if [ "$TEXT_SIZE" -lt 10000 ]; then
            echo "::error::Firmware .text is only ${TEXT_SIZE}B — linker script not applied"
            exit 1
          fi
          if [ "$TEXT_SIZE" -gt 200000 ]; then
            echo "::warning::Firmware .text is ${TEXT_SIZE}B — unexpectedly large"
          fi
        id: size

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: target/thumbv7em-none-eabi/release/microfips
          retention-days: 7

  sim-ping:
    name: Sim-to-Sim Ping via FIPS
    runs-on: ubuntu-latest
    needs: [build-host]
    continue-on-error: true
    timeout-minutes: 4
    env:
      FIPS_ADDR: orangeclaw.dns4sats.xyz:2121
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: microfips-sim
          path: ./bin

      - run: chmod +x ./bin/microfips-sim

      - name: Run sim-to-sim ping test against live FIPS
        run: |
          set -e

          ./bin/microfips-sim --udp "$FIPS_ADDR" --sim-a > /tmp/sim-a.log 2>&1 &
          SIMA_PID=$!
          sleep 8

          if ! kill -0 $SIMA_PID 2>/dev/null; then
            echo "::error::SIM-A crashed before SIM-B started"
            grep -E "(error|FAIL|ERR)" /tmp/sim-a.log || true
            exit 1
          fi
          echo "SIM-A connected"

          timeout 90 ./bin/microfips-sim --udp "$FIPS_ADDR" --sim-b --test-ping > /tmp/sim-b.log 2>&1 &
          SIMB_PID=$!

          wait $SIMB_PID 2>/dev/null
          EXIT=$?

          echo "=== SIM-B trace ==="
          grep -E "(MSG1|MSG2|handshake|ACK|PONG|PING|FAIL|error)" /tmp/sim-b.log || true

          echo "=== SIM-A trace ==="
          grep -E "(LEAF|sending|ACK|PONG|PING|FAIL|error)" /tmp/sim-a.log || true

          kill $SIMA_PID 2>/dev/null || true

          if [ "$EXIT" -eq 0 ]; then
            echo "=== PASS: PING/PONG round-trip confirmed via FIPS ==="
          else
            echo "::error::FAIL: SIM-B did not receive PONG (exit=$EXIT)"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          kill $(pgrep -f microfips-sim) 2>/dev/null || true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, build-host, lint, sim-smoke, sim-ping, build-firmware, fips-integration]
    if: always()
    steps:
      - run: |
          echo "# CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | \`${{ needs.test.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Host Tools | \`${{ needs.build-host.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Format | \`${{ needs.lint.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Simulator Smoke | \`${{ needs.sim-smoke.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sim-to-Sim Ping | \`${{ needs.sim-ping.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Firmware | \`${{ needs.build-firmware.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| FIPS Integration | \`${{ needs.fips-integration.result }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
