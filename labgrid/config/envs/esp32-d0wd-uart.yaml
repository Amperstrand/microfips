# ESP32-D0WD UART (serial bridge) environment
# Flash UART firmware, bridge serial↔UDP to FIPS
# Requires FIPS with UDP transport
# Usage: make test-esp32-uart

targets:
  main:
    resources:
      USBSerialPort:
        match:
          ID_VENDOR_ID: "10c4"
          ID_MODEL_ID: "ea60"
        speed: 115200
    drivers:
      SerialDriver: {}

images:
  firmware: "target/xtensa-esp32-none-elf/release/microfips-esp32"
